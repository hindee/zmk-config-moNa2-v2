CONFIG_ZMK_KEYBOARD_NAME="moNa2 L"

#Encoder config -------------------
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

#Battery config -------------------
CONFIG_ZMK_BATTERY_REPORTING=y

# ========================================
# ZMK Studio（Peripheral 側も必須）
# ========================================
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=y

# ========================================
# DYA Studio モジュール（Peripheral 側）
# ========================================
# バッテリー履歴
CONFIG_ZMK_BATTERY_HISTORY=y

# Settings RPC
CONFIG_ZMK_SETTINGS_RPC=y

# Split イベントリレー
CONFIG_ZMK_SPLIT_RELAY_EVENT=y

# 設定の永続化
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000

# ========================================
# レイアウトシフト
# ========================================
CONFIG_LAYOUT_SHIFT_TARGET_JIS=y # 日本語(JIS)レイアウト
CONFIG_LAYOUT_SHIFT_PERSISTENT_STATE=y
# ========================================
# BLE 接続設定
# ========================================
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n