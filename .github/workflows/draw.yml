name: "Draw Keymap"

on:
  workflow_dispatch:
  push:
    paths:
      - "config/mona2.keymap"
      - "keymap-drawer/keymap_drawer.config.yaml"
      - "boards/shields/mona2/mona2.dtsi"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse keymap
        run: |
          keymap -c keymap-drawer/keymap_drawer.config.yaml parse \
            -z config/mona2.keymap > keymap-drawer/mona2.yaml

      - name: Draw SVG
        run: |
          keymap -c keymap-drawer/keymap_drawer.config.yaml draw \
            keymap-drawer/mona2.yaml > keymap-drawer/mona2.svg

      - name: Commit SVG only
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # .gitignore に記載されていても強制的にステージング
          git add --force keymap-drawer/mona2.svg
          # mona2.yaml は add しない → コミットされない
          git diff --cached --quiet || git commit -m "[Draw] ${{ github.event.head_commit.message || 'Update keymap drawing' }}"
          git push